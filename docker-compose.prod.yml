# docker-compose.prod.yml
# ── Deploy ini di VPS ──
# Copy file ini ke ~/inventory-app/ di VPS
# Ganti <GITHUB_USER> dan <REPO_NAME> dengan GitHub username/repo

version: "3.8"

services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  fix-invent-db:
    image: postgres:16
    container_name: automasi_fix-invent-db
    restart: always
    environment:
      POSTGRES_USER: inventaksesoris1
      POSTGRES_PASSWORD: inventaksesoris123
      POSTGRES_DB: fix-invent-db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventaksesoris1 -d fix-invent-db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Next.js App (from GHCR) ─────────────────────────────────
  app:
    image: ${APP_IMAGE:-ghcr.io/GITHUB_USER/REPO_NAME:latest}
    container_name: automasi_inventory-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgres://inventaksesoris1:inventaksesoris123@fix-invent-db:5432/fix-invent-db?sslmode=disable"
      NEXTAUTH_SECRET: "inventory-production-secret-2026-bismillah"
      NEXTAUTH_URL: "https://YOUR_DOMAIN.com"
    depends_on:
      fix-invent-db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
